<!doctype html>
<html lang="sk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Jedálny lístok | Energo</title>
  <meta name="description" content="Jedálny lístok – Energo">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%230a0a0a'/%3E%3Cpath d='M32 8L18 36h10l-4 20 18-28H32l4-20z' fill='%23e11d2e'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #08080a;
      --surface: #0e0e11;
      --surface-2: #131316;
      --border: #1a1a1f;
      --border-light: #242429;
      --text: #e8e8ec;
      --text-2: #9898a0;
      --accent: #e11d2e;
      --accent-dim: rgba(225, 29, 46, .12);
      --green: #22c55e;
      --green-dim: rgba(34, 197, 94, .12);
      --radius: 16px;
      --font: 'Outfit', sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }

    body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
    }

    /* ========== HEADER ========== */
    header {
      padding: 20px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      background: rgba(8, 8, 10, .8);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: var(--text);
    }

    .brand svg { width: 28px; height: 28px; }

    .brand-name {
      font-weight: 900;
      font-size: 18px;
      letter-spacing: .5px;
    }

    .back-link {
      padding: 8px 16px;
      border-radius: 10px;
      font-weight: 500;
      font-size: 14px;
      color: var(--text-2);
      text-decoration: none;
      transition: color .15s, background .15s;
    }

    .back-link:hover {
      color: var(--text);
      background: var(--surface-2);
    }

    /* ========== MAIN ========== */
    main {
      flex: 1;
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
      padding: 0 20px;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .content {
      padding: 48px 0 64px;
      animation: fadeUp .3s ease;
    }

    /* ========== COUNTDOWN ========== */
    .countdown-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 32px;
      text-align: center;
      flex-wrap: wrap;
    }

    .countdown-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      display: grid;
      place-items: center;
      flex-shrink: 0;
    }

    .countdown-icon svg {
      width: 18px;
      height: 18px;
      color: var(--text-2);
    }

    .countdown-info {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 2px;
    }

    .countdown-label {
      font-size: 13px;
      color: var(--text-2);
      font-weight: 500;
    }

    .countdown-time {
      font-family: var(--mono);
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--text);
    }

    .countdown-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 500;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text-2);
    }

    .countdown-badge .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--border-light);
    }

    .countdown-badge.active {
      border-color: rgba(34, 197, 94, .3);
      background: var(--green-dim);
      color: var(--green);
    }

    .countdown-badge.active .dot {
      background: var(--green);
      box-shadow: 0 0 6px rgba(34, 197, 94, .4);
    }

    .countdown-badge.over {
      border-color: rgba(225, 29, 46, .25);
      background: var(--accent-dim);
      color: var(--accent);
    }

    .countdown-badge.over .dot {
      background: var(--accent);
    }

    /* ========== MENU IMAGE ========== */
    .section-heading {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-2);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .updated-text {
      font-size: 12px;
      color: var(--text-2);
      font-weight: 300;
      letter-spacing: 0;
      text-transform: none;
    }

    .menu-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      position: relative;
    }

    .menu-figure {
      position: relative;
      overflow: hidden;
      cursor: zoom-in;
    }

    .menu-figure img {
      width: 100%;
      height: auto;
      display: block;
      image-rendering: auto;
    }

    /* shimmer loader */
    .menu-figure::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, rgba(255,255,255,0), rgba(255,255,255,.06), rgba(255,255,255,0));
      transform: translateX(-100%);
      animation: shimmer 1.2s infinite;
      pointer-events: none;
    }

    .menu-figure.loaded::after { display: none; }

    @keyframes shimmer { to { transform: translateX(100%); } }

    .menu-actions {
      display: flex;
      justify-content: flex-end;
      padding: 14px 16px;
      border-top: 1px solid var(--border);
    }

    .btn-open {
      padding: 8px 16px;
      border-radius: 10px;
      font-weight: 500;
      font-size: 14px;
      color: var(--text-2);
      text-decoration: none;
      border: 1px solid var(--border);
      background: var(--surface-2);
      transition: border-color .15s, color .15s;
    }

    .btn-open:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    .menu-error {
      padding: 48px 20px;
      text-align: center;
      color: var(--text-2);
      font-weight: 300;
      display: none;
    }

    /* ========== LIGHTBOX ========== */
    .lightbox {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      z-index: 100;
      background: rgba(0, 0, 0, .8);
      backdrop-filter: blur(4px);
    }

    .lightbox.open { display: grid; }

    .lb-viewport {
      position: relative;
      width: min(95vw, 1200px);
      max-height: 92vh;
      overflow: hidden;
      display: grid;
      place-items: center;
    }

    .lb-img {
      display: block;
      max-width: none;
      max-height: none;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, .5);
      will-change: transform;
      transform-origin: 0 0;
      cursor: grab;
      user-select: none;
      -webkit-user-drag: none;
      touch-action: none;
      animation: lbIn .15s ease-out;
    }

    .lb-img.grabbing { cursor: grabbing; }

    @keyframes lbIn {
      from { transform: scale(.96); opacity: .6; }
      to { transform: scale(1); opacity: 1; }
    }

    .lb-hint {
      position: absolute;
      left: 50%;
      bottom: 12px;
      transform: translateX(-50%);
      font-size: 12px;
      font-weight: 500;
      color: var(--text-2);
      background: rgba(14, 14, 17, .85);
      border: 1px solid var(--border);
      padding: 8px 14px;
      border-radius: 999px;
      pointer-events: none;
      white-space: nowrap;
    }

    /* ========== FOOTER ========== */
    footer {
      text-align: center;
      padding: 24px 20px 32px;
      border-top: 1px solid var(--border);
      color: var(--text-2);
      font-size: 13px;
      font-weight: 300;
    }

    footer .accent {
      color: var(--accent);
      font-weight: 700;
    }

    @media (max-width: 500px) {
      header { padding: 16px; }
      main { padding: 0 16px; }
      .content { padding: 32px 0 48px; }
      .countdown-bar { gap: 12px; padding: 16px; }
      .countdown-time { font-size: 20px; }
    }
  </style>
</head>
<body>

  <header>
    <a class="brand" href="/">
      <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="32" height="32" rx="8" fill="#0e0e11"/>
        <path d="M16 4L9 18h5l-2 10 9-14h-5l2-10z" fill="#e11d2e"/>
      </svg>
      <span class="brand-name">Energo</span>
    </a>
    <a class="back-link" href="/">Spat</a>
  </header>

  <main>
    <div class="content">

      <!-- COUNTDOWN -->
      <div class="countdown-bar" id="countdown">
        <div class="countdown-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8h1a4 4 0 0 1 0 8h-1"/>
            <path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/>
            <line x1="6" x2="6" y1="1" y2="4"/>
            <line x1="10" x2="10" y1="1" y2="4"/>
            <line x1="14" x2="14" y1="1" y2="4"/>
          </svg>
        </div>
        <div class="countdown-info">
          <span class="countdown-label" id="cdLabel">Do obeda</span>
          <span class="countdown-time" id="cdTime">--:--:--</span>
        </div>
        <span class="countdown-badge" id="cdBadge">
          <span class="dot"></span>
          <span id="cdStatus">Nacitavam...</span>
        </span>
      </div>

      <!-- MENU IMAGE -->
      <div class="section-heading">
        <span>Jedalny listok</span>
        <time class="updated-text" id="menuUpdated"></time>
      </div>

      <div class="menu-card">
        <div class="menu-figure" id="menuFigure">
          <img id="menuImg" alt="Jedalny listok" loading="lazy" decoding="async">
        </div>
        <div class="menu-error" id="menuError">Nepodarilo sa nacitat jedalny listok.</div>
        <div class="menu-actions">
          <a class="btn-open" id="openFull" href="/assets/menu.png" target="_blank" rel="noopener">Otvorit original</a>
        </div>
      </div>

    </div>
  </main>

  <!-- LIGHTBOX -->
  <div class="lightbox" id="lb" role="dialog" aria-modal="true" aria-label="Zvacseny jedalny listok">
    <div class="lb-viewport" id="lbViewport">
      <img class="lb-img" id="lbImg" alt="" draggable="false">
      <div class="lb-hint">Kolieskom priblizenie · Tahanim posun · Kliknutim mimo zatvoris</div>
    </div>
  </div>

  <footer>
    <span class="accent">&#9889;</span> Energo &middot; &copy; <span id="year"></span>
  </footer>

  <script>
  (() => {
    'use strict';

    document.getElementById('year').textContent = new Date().getFullYear();

    // ===== COUNTDOWN TO 12:45 =====
    const TZ = 'Europe/Bratislava';
    const LUNCH_H = 12, LUNCH_M = 45;

    const fmtTime = new Intl.DateTimeFormat('sk-SK', {
      timeZone: TZ, hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
    });

    const cdTime = document.getElementById('cdTime');
    const cdLabel = document.getElementById('cdLabel');
    const cdBadge = document.getElementById('cdBadge');
    const cdStatus = document.getElementById('cdStatus');

    function getNowParts() {
      const parts = fmtTime.formatToParts(new Date());
      return {
        h: +parts.find(p => p.type === 'hour').value,
        m: +parts.find(p => p.type === 'minute').value,
        s: +parts.find(p => p.type === 'second').value
      };
    }

    function tickCountdown() {
      const { h, m, s } = getNowParts();
      const nowSec = h * 3600 + m * 60 + s;
      const lunchSec = LUNCH_H * 3600 + LUNCH_M * 60;
      const diff = lunchSec - nowSec;

      if (diff > 0) {
        // before lunch
        const dh = Math.floor(diff / 3600);
        const dm = Math.floor((diff % 3600) / 60);
        const ds = diff % 60;
        cdTime.textContent = `${String(dh).padStart(2,'0')}:${String(dm).padStart(2,'0')}:${String(ds).padStart(2,'0')}`;
        cdLabel.textContent = 'Do obeda (12:45)';
        cdBadge.className = 'countdown-badge';
        cdStatus.textContent = 'Caka sa';
      } else if (diff >= -1800) {
        // lunch break active (12:45 - 13:15 = 30 min)
        const left = 1800 + diff;
        const lm = Math.floor(left / 60);
        const ls = left % 60;
        cdTime.textContent = `00:${String(lm).padStart(2,'0')}:${String(ls).padStart(2,'0')}`;
        cdLabel.textContent = 'Obedova prestavka';
        cdBadge.className = 'countdown-badge active';
        cdStatus.textContent = 'Prave teraz';
      } else {
        // after lunch
        cdTime.textContent = '00:00:00';
        cdLabel.textContent = 'Obed skoncil';
        cdBadge.className = 'countdown-badge over';
        cdStatus.textContent = 'Po obede';
      }
    }

    tickCountdown();
    setInterval(tickCountdown, 1000);

    // ===== MENU IMAGE =====
    const today = new Date().toISOString().slice(0, 10);
    const base = '/assets/menu.png';

    const img = document.getElementById('menuImg');
    const fig = document.getElementById('menuFigure');
    const updatedEl = document.getElementById('menuUpdated');
    const openFull = document.getElementById('openFull');
    const menuError = document.getElementById('menuError');

    img.src = base + '?v=' + today;

    function markLoaded() { fig.classList.add('loaded'); }
    if (img.complete && img.naturalWidth) markLoaded();
    else img.addEventListener('load', markLoaded);

    img.addEventListener('error', () => {
      markLoaded();
      fig.style.display = 'none';
      menuError.style.display = 'block';
    });

    // try to load metadata
    fetch(base + '.json', { cache: 'no-store' })
      .then(r => r.ok ? r.json() : null)
      .then(d => {
        const full = (d && d.img) || base;
        const dt = new Date((d && d.fetchedAt) || Date.now());
        updatedEl.textContent = 'Aktualizovane ' + dt.toLocaleString('sk-SK', { dateStyle: 'medium', timeStyle: 'short' });
        openFull.href = full + '?v=' + today;
        img.dataset.full = full + '?v=' + today;
      })
      .catch(() => { img.dataset.full = base + '?v=' + today; });

    // ===== LIGHTBOX =====
    const lb = document.getElementById('lb');
    const lbImg = document.getElementById('lbImg');
    const viewport = document.getElementById('lbViewport');

    const S = { scale: 1, min: 1, max: 8, tx: 0, ty: 0, vw: 0, vh: 0, iw: 0, ih: 0 };
    let dragging = false, sx = 0, sy = 0, ox = 0, oy = 0;

    lbImg.addEventListener('dragstart', e => e.preventDefault());

    function fitToViewport() {
      S.vw = viewport.clientWidth;
      S.vh = viewport.clientHeight;
      S.iw = lbImg.naturalWidth || lbImg.width;
      S.ih = lbImg.naturalHeight || lbImg.height;
      const scx = S.vw / S.iw, scy = S.vh / S.ih;
      S.min = Math.min(scx, scy);
      S.scale = S.min;
      S.tx = (S.vw - S.iw * S.scale) * 0.5;
      S.ty = (S.vh - S.ih * S.scale) * 0.5;
      applyTransform();
    }

    function applyTransform() {
      lbImg.style.transform = `translate(${S.tx}px, ${S.ty}px) scale(${S.scale})`;
    }

    function openLB() {
      lbImg.src = img.dataset.full || img.src;
      lb.classList.add('open');
      if (lbImg.complete) fitToViewport();
      else lbImg.onload = fitToViewport;
    }

    function closeLB() {
      lb.classList.remove('open');
      lbImg.src = '';
    }

    const STEP = 1.15;
    function zoomAt(x, y, factor) {
      const ns = Math.min(S.max, Math.max(S.min, S.scale * factor));
      if (ns === S.scale) return;
      const imgX = (x - S.tx) / S.scale;
      const imgY = (y - S.ty) / S.scale;
      S.tx = x - imgX * ns;
      S.ty = y - imgY * ns;
      if (ns <= S.min) { fitToViewport(); return; }
      S.scale = ns;
      clampTranslate();
      applyTransform();
    }

    function clampTranslate() {
      const w = S.iw * S.scale, h = S.ih * S.scale;
      const minX = Math.min(0, S.vw - w), maxX = Math.max(0, S.vw - w);
      const minY = Math.min(0, S.vh - h), maxY = Math.max(0, S.vh - h);
      S.tx = Math.min(maxX, Math.max(minX, S.tx));
      S.ty = Math.min(maxY, Math.max(minY, S.ty));
    }

    function onDown(e) {
      if (S.scale <= S.min) return;
      e.preventDefault();
      dragging = true;
      lbImg.classList.add('grabbing');
      sx = e.clientX; sy = e.clientY; ox = S.tx; oy = S.ty;
      window.addEventListener('pointermove', onMove, { passive: false });
      window.addEventListener('pointerup', onUp, { once: true });
    }

    function onMove(e) {
      if (!dragging) return;
      e.preventDefault();
      S.tx = ox + (e.clientX - sx);
      S.ty = oy + (e.clientY - sy);
      clampTranslate();
      applyTransform();
    }

    function onUp() {
      dragging = false;
      lbImg.classList.remove('grabbing');
      window.removeEventListener('pointermove', onMove);
    }

    fig.addEventListener('click', openLB);
    lb.addEventListener('click', e => { if (e.target === lb) closeLB(); });

    viewport.addEventListener('wheel', e => {
      e.preventDefault();
      const r = viewport.getBoundingClientRect();
      zoomAt(e.clientX - r.left, e.clientY - r.top, e.deltaY > 0 ? 1 / STEP : STEP);
    }, { passive: false });

    lbImg.addEventListener('pointerdown', onDown);
    window.addEventListener('resize', () => { if (lb.classList.contains('open')) fitToViewport(); });
  })();
  </script>
</body>
</html>
